[markup]
  # иѓ≠ж≥ХйЂШдЇЃиЃЊзљЃ (https://gohugo.io/content-management/syntax-highlighting)
  [markup.highlight]
    noClasses = false
    lineNos = true  # йїШиЃ§жШЊз§Їи°МеПЈ
    lineNumberInTable = true # жШЊз§Їи°МеПЈеИЩдљњзФ®и°®ж†ЉељҐеЉП
    lineNoStart = 1 # йїШиЃ§дїО1еЉАеІЛ
    anchorLineNos = false # йїШиЃ§дЄНзФЯжИРи°МеПЈйФЪзВє
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions]
    # еЕђеЉПжЄ≤жЯУжФѓжМБ
    [markup.goldmark.extensions.passthrough]
        enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]
  [markup.goldmark.parser]
  # markdown е±ЮжАІ: https://gohugo.io/content-management/markdown-attributes/
    [markup.goldmark.parser.attaribute]
      bolck = true
      title = true


[params]
  externalIcon = true
  defaultTheme = "auto"
  [params.jsonViewer]
    enable = true
    expandDepth = 1
    copyable = true
    sort = false
    boxed = true
  [params.codeblock]
    wrapper = true
    mode = "classic"
    maxShownLines = 20
    copyable = true
    lineNosToggler = true
    lineWrapToggler = true
    editable = true
  [params.author]
    name = "kamiertop"
    avatar = "/avatar.png"
  [params.page]
    authorAvatar = true
    twemoji = true
    fontawesome = true
    linkToMarkdown = false
    linkToSource = false
    linkToEdit = false
    linkToReport = false
    license = ""
    titleCaseStyle = "ap"
    [params.page.math]
      enable = true
      type = "mathjax"
      errorColor = "#ff4949"
      [params.page.math.katex]
        copyTex = true
    [params.page.share]
      enable = false
    [params.page.comment]
      enable = true
    [params.page.comment.commento]
      enable = false
    [params.page.comment.utterances]
      enable = true
      repo = "kamiertop/kamiertop.github.io"
      lightTheme = "github-light"
      darkTheme = "github-dark"
      issueTerm = "pathname"
      label = ""
  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    # placeholder of the search bar
    placeholder = ""
    # max number of results length
    maxResultLength = 10
    # snippet length of the result
    snippetLength = 30
    # HTML tag name of the highlight part in results
    highlightTag = "em"
    # whether to use the absolute URL based on the baseURL in search index
    absoluteURL = false
  [params.search.fuse]
    isCaseSensitive = false # дЄНеМЇеИЖе§Іе∞ПеЖЩ
    minMatchCharLength = 2
    findAllMatches = false
    location = 0
    threshold = 0.3
    distance = 100
    ignoreLocation = false
    useExtendedSearch = false
    ignoreFieldNorm = false
  [params.home]
    [params.home.profile]
        enable = true
        avatarURL = "/avatar.png"
        typeit = true
        social = true
        title = "жђҐињОе§ІеЃґ"
    [params.home.posts]
        enable = true
        paginate = 10
  [params.social]
    RSS = false
    [params.social.github]
      title = "Github"
      id = "kamiertop"
      prefix = "https://github.com"
    [params.social.email]
      title = "kamiertop@gmail.com"
      id = "kamiertop@gmail.com"
  [params.githubCorner]
    enable = true
    permalink = "https://github.com/kamiertop/kamiertop.github.io"
    title = "еЬ® GitHub дЄКжЯ•зЬЛжЇРдї£з†Б"
    position = "right"
  # ж†Зз≠ЊдЇС
  [params.tagcloud]
    enable = true
    min = 14
    max = 32
    peakCount = 10
    orderby = "name"
  [params.pace]
      enable = true
      color = "blue"
      theme = "minimal"
  [params.watermark]
      enable = false
      content = "kamiertop"
      opacity = 0.1
      width = 150
      height = 20
      rowSpacing = 60
      colSpacing = 30
      rotate = 15
      fontSize = 0.85
      fontFamily = "inherit"
  [params.breadcrumb]
    enable = true
    sticky = false      # жШѓеР¶еЫЇеЃЪйЭҐеМЕе±СеѓЉиИ™
    showHome = true     # жШѓеР¶жШЊз§ЇдЄїй°µйУЊжО•
    separator = "/"
    capitalize = false  # жШѓеР¶е§Іе∞ПйЭҐеМЕе±СеѓЉиИ™
  [params.footer]
    enable = true
    # FixIt 0.2.17 | жЫіжФє иЗ™еЃЪдєЙеЖЕеЃєпЉИжФѓжМБ HTML ж†ЉеЉПпЉЙ
    # ињЫйШґдљњзФ®пЉМиІБеПВжХ∞ `params.customFilePath.footer`
    custom = ""
    # FixIt 0.2.0 | жЦ∞еҐЮ жШѓеР¶жШЊз§ЇзЙИжЭГдњ°жБѓ
    copyright = true
    # FixIt 0.2.0 | жЦ∞еҐЮ жШѓеР¶жШЊз§ЇдљЬиАЕ
    author = true
    # зљСзЂЩеИЫзЂЛеєідїљ
    since = 2021
    # FixIt 0.2.12 | жЦ∞еҐЮ еЕђзљСеЃЙе§Здњ°жБѓпЉМдїЕеЬ®дЄ≠еЫљдљњзФ®пЉИжФѓжМБ HTML ж†ЉеЉПпЉЙ
    gov = ""
    # FixIt 0.2.12 | жЫіжФє ICP е§Зж°Идњ°жБѓпЉМдїЕеЬ®дЄ≠еЫљдљњзФ®пЉИжФѓжМБ HTML ж†ЉеЉПпЉЙ
    icp = ""
    # иЃЄеПѓеНПиЃЃдњ°жБѓпЉИжФѓжМБ HTML ж†ЉеЉПпЉЙ
    license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>'
    [params.footer.powered]
      enable = true
      hugoLogo = true
      themeLogo = true
    [params.footer.siteTime]
      enable = false
      animate = true
      icon = "fa-solid fa-heartbeat"
      pre = ""
      value = ""
    [params.footer.order]
      powered = 0
      copyright = 0
      statistics = 0
      visitor = 0
      beian = 0
  [params.archives]
      paginate = 20
      dateFormat = "01-02"
  [params.mermaid]
    themes = ["default", "dark"]
  [params.cookieconsent]
    enable = false
  [params.backToTop]
    enable = true
  [params.readingProgress]
    enable = true
    start = "left"
    position = "top"
    reversed = false
    light = ""
    dark = ""
    height = "2px"
  [params.list]
      paginate = 20
      dateFormat = "01-02"
      [params.list.feed]
        limit = -1
        fullText = false
  [params.analytics]
    enable = true
  # жЬАињСжЫіжЦ∞жЦЗзЂ†иЃЊзљЃ
  [params.recentlyUpdated]
      archives = true
      section = false
      list = true
      days = 30
      maxCount = 10

[outputs]
